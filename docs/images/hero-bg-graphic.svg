    <circle cx="505" cy="270" r="2.5"/>
    <circle cx="650" cy="340" r="2.5"/>
    <circle cx="970" cy="345" r="2.5"/>
    <circle cx="1290" cy="340" r="2.5"/>
    <circle cx="1430" cy="270" r="2.5"/>
    <circle cx="120" cy="520" r="2.5"/>
    <circle cx="285" cy="460" r="2.5"/>
